<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bgLaunchModel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accLaunchModel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="iconLaunchModel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glowLaunchModel" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridLaunchModel" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="rgLaunchModel" cx="85%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bgLaunchModel)"/>
  <rect width="1280" height="320" fill="url(#gridLaunchModel)" opacity="0.4"/>
  <rect width="1280" height="320" fill="url(#rgLaunchModel)"/>
  <rect x="0" y="0" width="1280" height="2" fill="url(#accLaunchModel)" opacity="0.7"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#accLaunchModel)"/>

  <g transform="translate(64, 112)" filter="url(#glowLaunchModel)">
